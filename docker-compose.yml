version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: analytics-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: analytics
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./server
    container_name: analytics-api
    ports:
      - "5000:5000"
    depends_on:
      - postgres
    env_file:
      - ./server/.env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/businessdb

  frontend:
    build: ./client
    container_name: analytics-ui
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata: